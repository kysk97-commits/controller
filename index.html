<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>micro:bit Controller</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    background:#222;
    color:white;
}

#status{
    margin:20px;
    font-size:20px;
}

button{
    width:120px;
    height:60px;
    margin:8px;
    font-size:20px;
}
</style>

</head>

<body>

<h2>micro:bit Controller</h2>

<div id="status">未接続</div>

<button id="connectBtn">micro:bit 接続</button>

<br><br>

<button onclick="sendCommand('F')">前進</button>

<br>

<button onclick="sendCommand('L')">左</button>

<button onclick="sendCommand('S')">停止</button>

<button onclick="sendCommand('R')">右</button>

<br>

<button onclick="sendCommand('B')">後退</button>

<script>

let device;
let server;
let service;
let rxCharacteristic;

// Nordic UART Service
const SERVICE_UUID = "6E400001-B5A3-F393-E0A9-E50E24DCCA9E";
const RX_UUID      = "6E400002-B5A3-F393-E0A9-E50E24DCCA9E";
const TX_UUID      = "6E400003-B5A3-F393-E0A9-E50E24DCCA9E";

document.getElementById("connectBtn").onclick = async () => {

    try {

        device = await navigator.bluetooth.requestDevice({

            filters: [
                {
                    services: [SERVICE_UUID]
                }
            ]

        });

        server = await device.gatt.connect();

        service = await server.getPrimaryService(SERVICE_UUID);

        rxCharacteristic =
            await service.getCharacteristic(RX_UUID);

        document.getElementById("status").innerText =
            "接続完了";

    }

    catch (e) {

        console.log(e);

        document.getElementById("status").innerText =
            "接続失敗";

    }

};

async function sendCommand(cmd){

    if(!rxCharacteristic){

        alert("先にmicro:bitへ接続してください");

        return;

    }

    const data =
        new TextEncoder().encode(cmd + "\n");

    await rxCharacteristic.writeValue(data);

    console.log("Send:",cmd);

}

</script>

</body>

</html>
