<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>micro:bit PC Controller</title>
<style>
button {
  font-size: 20px;
  padding: 10px 20px;
  margin: 10px;
}
</style>
</head>
<body>

<h2>micro:bit PC Controller</h2>

<button onclick="connect()">micro:bit 接続</button>
<button onclick="send('A')">A</button>
<button onclick="send('B')">B</button>
<button onclick="send('STOP')">STOP</button>

<script>
let device = null;
let uartService = null;

async function connect() {
  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: "BBC micro:bit" }],
      optionalServices: ["6e400001-b5a3-f393-e0a9-e50e24dcca9e"]
    });

    const server = await device.gatt.connect();
    uartService = await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dcca9e");

    alert("micro:bit 接続完了");
  } catch (error) {
    alert("接続エラー: " + error);
  }
}

async function send(text) {
  if (!uartService) {
    alert("まだ接続されていません");
    return;
  }

  const tx = await uartService.getCharacteristic("6e400002-b5a3-f393-e0a9-e50e24dcca9e");
  await tx.writeValue(new TextEncoder().encode(text));
}
</script>

</body>
</html>
