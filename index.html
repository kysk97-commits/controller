<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>micro:bit Gamepad Controller</title>
<style>
body { font-family: sans-serif; text-align: center; background: #222; color: white; }
#status { margin: 20px; font-size: 20px; }

.stickArea {
    width: 200px; height: 200px;
    background: #444; border-radius: 100px;
    margin: 20px; position: relative; display: inline-block;
}
.stick {
    width: 70px; height: 70px;
    background: #00aaff; border-radius: 35px;
    position: absolute; left: 65px; top: 65px;
    box-shadow: 0 0 10px #00aaff;
}

.button {
    width: 70px; height: 70px;
    background: #555; border-radius: 35px;
    display: inline-flex; justify-content: center; align-items: center;
    margin: 10px; font-size: 24px; color: white;
    box-shadow: 0 0 10px #999;
}
.button:active {
    background: #00ff99;
}
</style>
</head>

<body>
<h2>micro:bit Gamepad Controller</h2>
<div id="status">未接続</div>

<button id="connectBtn">micro:bit 接続</button>

<h3>オムニ3輪（左スティック）</h3>
<div id="stickMove" class="stickArea">
    <div id="stickMoveKnob" class="stick"></div>
</div>

<h3>アーム操作（右スティック）</h3>
<div id="stickArm" class="stickArea">
    <div id="stickArmKnob" class="stick"></div>
</div>

<h3>ボタン</h3>
<div>
    <div class="button" onclick="pressButton('A')">A</div>
    <div class="button" onclick="pressButton('B')">B</div>
    <div class="button" onclick="pressButton('X')">X</div>
    <div class="button" onclick="pressButton('Y')">Y</div>
</div>

<script>
let device;
let characteristic;

// micro:bit V2 UART UUID
document.getElementById("connectBtn").onclick = async () => {
    try {
        device = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: "BBC micro:bit" }],
            optionalServices: [0xFFE1]
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(0xFFE1);
        characteristic = await service.getCharacteristic(0xFFE1);

        document.getElementById("status").innerText = "接続完了";

        // ★ 接続成功通知を micro:bit に送る
        sendJSON({ connected: true });

    } catch (e) {
        document.getElementById("status").innerText = "接続失敗";
    }
};

// スティック値
let moveX = 0, moveY = 0;
let armX = 0, armY = 0;

// スティック処理
function setupStick(areaId, knobId, callback) {
    const area = document.getElementById(areaId);
    const knob = document.getElementById(knobId);

    area.addEventListener("touchmove", (e) => {
        const rect = area.getBoundingClientRect();
        const x = e.touches[0].clientX - rect.left - 100;
        const y = e.touches[0].clientY - rect.top - 100;

        const r = Math.min(80, Math.sqrt(x*x + y*y));
        const angle = Math.atan2(y, x);

        const nx = r * Math.cos(angle);
        const ny = r * Math.sin(angle);

        knob.style.left = (nx + 100 - 35) + "px";
        knob.style.top = (ny + 100 - 35) + "px";

        callback(nx, ny);
    });

    area.addEventListener("touchend", () => {
        knob.style.left = "65px";
        knob.style.top = "65px";
        callback(0, 0);
    });
}

// 左スティック（オムニ）
setupStick("stickMove", "stickMoveKnob", (x, y) => {
    moveX = Math.round(x);
    moveY = Math.round(y);
    sendData();
});

// 右スティック（サーボ）
setupStick("stickArm", "stickArmKnob", (x, y) => {
    armX = Math.round(x);
    armY = Math.round(y);
    sendData();
});

// ボタン送信
function pressButton(btn) {
    sendJSON({ btn: btn });
}

// UART送信（JSON）
function sendData() {
    sendJSON({
        x: moveX,
        y: moveY,
        ax: armX,
        ay: armY
    });
}

function sendJSON(obj) {
    if (!characteristic) return;
    const data = new TextEncoder().encode(JSON.stringify(obj) + "\n");
    characteristic.writeValue(data);
}
</script>

</body>
</html>
