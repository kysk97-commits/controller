<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>micro:bit Controller</title>
<style>
body {
    font-family: sans-serif;
    text-align: center;
    margin-top: 40px;
}
button {
    font-size: 22px;
    padding: 15px 25px;
    margin: 10px;
}
input {
    width: 80px;
    font-size: 20px;
}
</style>
</head>

<body>
<h1>micro:bit Controller</h1>

<button id="connectBtn">🔵 Connect micro:bit</button>
<button id="sendBtn">📤 Send JSON</button>

<h2>Joystick 1</h2>
X1: <input id="x1" type="number" value="512"><br>
Y1: <input id="y1" type="number" value="512"><br>

<h2>Joystick 2</h2>
X2: <input id="x2" type="number" value="512"><br>
Y2: <input id="y2" type="number" value="512"><br>

<h2>Buttons</h2>
A: <input id="btnA" type="number" value="0"><br>
B: <input id="btnB" type="number" value="0"><br>
X: <input id="btnX" type="number" value="0"><br>
Y: <input id="btnY" type="number" value="0"><br>

<script>
let uartServer;
let uartTx;

// UART UUID（micro:bit 固定）
const UART_SERVICE = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const UART_TX = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";   // write

// ① 接続処理
document.getElementById("connectBtn").onclick = async () => {
    try {
        const device = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: [UART_SERVICE]
        });

        const server = await device.gatt.connect();
        uartServer = await server.getPrimaryService(UART_SERVICE);
        uartTx = await uartServer.getCharacteristic(UART_TX);

        alert("micro:bit と接続成功！");
    } catch (error) {
        alert("接続エラー: " + error);
        console.error(error);
    }
};

// ② JSON送信
document.getElementById("sendBtn").onclick = async () => {
    if (!uartTx) {
        alert("まだ接続されていません");
        return;
    }

    const data = {
        x1: Number(document.getElementById("x1").value),
        y1: Number(document.getElementById("y1").value),
        x2: Number(document.getElementById("x2").value),
        y2: Number(document.getElementById("y2").value),
        A: Number(document.getElementById("btnA").value),
        B: Number(document.getElementById("btnB").value),
        X: Number(document.getElementById("btnX").value),
        Y: Number(document.getElementById("btnY").value)
    };

    const text = JSON.stringify(data) + "\n";
    const encoder = new TextEncoder();
    await uartTx.writeValue(encoder.encode(text));

    console.log("Sent:", text);
};
</script>
</body>
</html>
