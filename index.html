<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Omni Robot Controller</title>
<style>
#stickArea {
  width: 300px;
  height: 300px;
  background: #eee;
  border-radius: 50%;
  margin: 20px auto;
  touch-action: none;
  position: relative;
}
#stick {
  width: 80px;
  height: 80px;
  background: #888;
  border-radius: 50%;
  position: absolute;
  left: 110px;
  top: 110px;
}
button {
  font-size: 20px;
  padding: 10px;
  margin: 10px;
}
</style>
</head>
<body>

<h2>Omni Robot Controller</h2>

<button onclick="connect()">micro:bit 接続</button>

<div id="stickArea">
  <div id="stick"></div>
</div>

<script>
let device = null;
let uartService = null;

async function connect() {
  device = await navigator.bluetooth.requestDevice({
    filters: [{ namePrefix: "BBC micro:bit" }],
    optionalServices: ["6e400001-b5a3-f393-e0a9-e50e24dcca9e"]
  });

  const server = await device.gatt.connect();
  uartService = await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dcca9e");

  alert("接続完了");
}

async function send(text) {
  if (!uartService) return;
  const tx = await uartService.getCharacteristic("6e400002-b5a3-f393-e0a9-e50e24dcca9e");
  await tx.writeValue(new TextEncoder().encode(text + "\n"));
}

// ===== スティック処理 =====
const area = document.getElementById("stickArea");
const stick = document.getElementById("stick");

// 指を置いた瞬間に送信開始

  isTouching = true;
  send("0,0,0");
});
