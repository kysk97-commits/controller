<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>micro:bit Controller</title>

<style>
body{
    background:#222;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

button{
    width:120px;
    height:60px;
    margin:10px;
    font-size:20px;
}

#status{
    margin:20px;
    font-size:22px;
}
</style>

</head>

<body>

<h2>micro:bit Controller</h2>

<div id="status">未接続</div>

<button onclick="connect()">micro:bit接続</button>

<script>

let rxCharacteristic = null;

// Nordic UART Service
const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const RX_UUID      = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
const TX_UUID      = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

async function connect(){

    try{

        document.getElementById("status").innerHTML="検索中...";

        const device =
        await navigator.bluetooth.requestDevice({

            acceptAllDevices:true,

            optionalServices:[
                SERVICE_UUID
            ]

        });

        const server =
        await device.gatt.connect();

        const service =
        await server.getPrimaryService(
            SERVICE_UUID
        );

        rxCharacteristic =
        await service.getCharacteristic(
            RX_UUID
        );

        document.getElementById("status").innerHTML="接続成功";

    }

    catch(e){

        console.log(e);

        document.getElementById("status").innerHTML="接続失敗";

    }

}

async function send(cmd){

    if(rxCharacteristic==null){

        alert("先に接続してください");

        return;

    }

    const data =
    new TextEncoder().encode(cmd+"\n");

    await rxCharacteristic.writeValue(data);

}

</script>

<br>

<button onclick="send('F')">前進</button><br>

<button onclick="send('L')">左</button>

<button onclick="send('S')">停止</button>

<button onclick="send('R')">右</button><br>

<button onclick="send('B')">後退</button>

</body>
</html>
