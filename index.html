<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>micro:bit Controller</title>
<style>
body {
    font-family: sans-serif;
    text-align: center;
    background: #222;
    color: white;
}

#pad {
    display: flex;
    justify-content: space-around;
    margin-top: 30px;
}

.joystickArea {
    width: 180px;
    height: 180px;
    background: #444;
    border-radius: 50%;
    position: relative;
    touch-action: none;
}

.stick {
    width: 70px;
    height: 70px;
    background: #00aaff;
    border-radius: 50%;
    position: absolute;
    left: 55px;
    top: 55px;
}

#buttons {
    margin-top: 40px;
}

.btn {
    width: 80px;
    height: 80px;
    background: #ff4444;
    border-radius: 50%;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    margin: 10px;
    touch-action: none;
}
</style>
</head>

<body>
<h1>micro:bit Controller</h1>

<button id="connectBtn" style="font-size:22px;padding:15px 25px;">🔵 Connect micro:bit</button>

<div id="pad">
    <div id="joy1" class="joystickArea">
        <div id="stick1" class="stick"></div>
    </div>

    <div id="joy2" class="joystickArea">
        <div id="stick2" class="stick"></div>
    </div>
</div>

<div id="buttons">
